version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: halepulse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-halepulse_secret}
      POSTGRES_DB: halepulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://halepulse:${DB_PASSWORD:-halepulse_secret}@db:5432/halepulse?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production

volumes:
  pgdata:
